<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/singup.css">
    <link rel="icon" href="../assets/icons/icon_logoo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Poppins:wght@200;300;400;500&display=swap" rel="stylesheet">
    <title>MyTems | Registro</title>
</head>
<body>
    <header>
        <div class="header--navbar-container container">
            <figure class="header-logo">
                <a class="logo--style" href="../index.html">
                    <img src="../assets/icons/palanca_logo.svg" alt="MyTems logo">
                    MyTems
                </a>
            </figure>
            <div class="header--loging">
                <a href="../index.html">Volver al inicio</a>
            </div>
        </div>
    </header>

    <div class="background--form">
        <div class="container-singup--form">
            <div class="singup--title">
                <h1>Crea una cuenta de MyTems</h1>
            </div>
            <div class="sinup-content">
                <form action="#" method="post" novalidate>
                    <div class="sinup--items">
                        <label for="email">Correo electrónico</label>
                        <input class="items--text" type="email" id="email" name="email" autocomplete="email" required>
                    </div>

                    <div class="sinup--items">
                        <label for="username">Nombre de usuario</label>
                        <input class="items--text" type="text" id="username" name="username" autocomplete="username" required>
                    </div>

                    <div class="sinup--items">
                        <label for="password">Contraseña</label>
                        <input class="items--text" type="password" id="password" name="password" autocomplete="new-password" required>
                    </div>

                    <div class="sinup--items">
                        <label>Fecha de nacimiento</label>
                        <div class="sinup--items-date">
                            <div class="date-items">
                                <label for="day">Día</label>
                                <select id="day" name="birthday_day" aria-label="Día">
                                    <option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option><option value="11">11</option><option value="12">12</option><option value="13">13</option><option value="14">14</option><option value="15">15</option><option value="16">16</option><option value="17">17</option><option value="18">18</option><option value="19">19</option><option value="20">20</option><option value="21">21</option><option value="22">22</option><option value="23">23</option><option value="24">24</option><option value="25">25</option><option value="26">26</option><option value="27">27</option><option value="28">28</option><option value="29">29</option><option value="30">30</option><option value="31">31</option>
                                </select>
                            </div>
                            <div class="date-items">
                                <label for="month">Mes</label>
                                <select id="month" name="birthday_month" aria-label="Mes">
                                    <option value="1">Ene</option><option value="2">Feb</option><option value="3">Mar</option><option value="4">Abr</option><option value="5">May</option><option value="6">Jun</option><option value="7">Jul</option><option value="8">Ago</option><option value="9">Sep</option><option value="10">Oct</option><option value="11">Nov</option><option value="12">Dic</option>
                                </select>
                            </div>
                            <div class="date-items">
                                <label for="year">Año</label>
                                <select id="year" name="birthday_year" aria-label="Año">
                                    <option value="2010">2010</option><option value="2009">2009</option><option value="2008">2008</option><option value="2007">2007</option><option value="2006">2006</option><option value="2005">2005</option><option value="2004">2004</option><option value="2003">2003</option><option value="2002">2002</option><option value="2001">2001</option><option value="2000">2000</option><option value="1999">1999</option><option value="1998">1998</option><option value="1997">1997</option><option value="1996">1996</option><option value="1995">1995</option><option value="1994">1994</option><option value="1993">1993</option><option value="1992">1992</option><option value="1991">1991</option><option value="1990">1990</option><option value="1985">1985</option><option value="1980">1980</option><option value="1975">1975</option><option value="1970">1970</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="sinup--items">
                        <label>Género</label>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="genero" value="mujer"> Mujer
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="genero" value="hombre"> Hombre
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="genero" value="personalizado"> Personalizado
                            </label>
                        </div>
                    </div>

                    <div class="sinup--items">
                        <label class="checkbox-label">
                            <input type="checkbox" name="terms" required>
                            Acepto los <a href="#">términos y condiciones</a> de MyTems
                        </label>
                    </div>

                    <div class="sinup--items">
                        <button class="btn-submit" type="submit">Registrarse</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
